# Single nginx that serves the admin SPA and proxies /api/* to the api container.
# Used by both the local admin Dockerfile and the production compose reference.

server {
    listen 3000 default_server;
    listen [::]:3000 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: any non-asset path falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy — backend lives at `api:8000` in compose.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverb websocket upgrade — backend at `api:8080`.
    location /reverb {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600;
    }

    # Health
    location = /up {
        proxy_pass http://api:8000/up;
    }

    # Static asset cache headers
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
